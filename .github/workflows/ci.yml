name: Public content CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_CONTENT_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install WebP validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes webp
      - run: npm ci
      - run: npm run validate:public
