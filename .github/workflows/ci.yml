name: Public content CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  game:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_CONTENT_ONLY: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install WebP validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes webp
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run validate:public

  website:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - run: npm ci
        working-directory: ${{ github.workspace }}
      - run: npm run site:sync-game
        working-directory: ${{ github.workspace }}
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm audit --audit-level=high
