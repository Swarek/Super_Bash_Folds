name: Bug report
description: Report a reproducible gameplay, controller, UI, or tooling problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Super Bash Folds. Do not attach proprietary assets, credentials, or personal data.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - Controllers or input
        - Fighter pack tooling
        - Stage pack tooling
        - Animation Lab
        - Website
        - Build or tests
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Explain the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open…
        2. Select…
        3. Press…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or a commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, operating system, and controller
      placeholder: Firefox 128, Windows 11, Xbox controller
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or recording
      description: Paste short relevant logs or attach an open-content-only recording.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report contains no proprietary assets, credentials, or personal data.
          required: true
